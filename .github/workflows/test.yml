name: test
on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "*"
    paths-ignore:
      - "*.md"
      - "docs/**"
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go_version:
          - "1.24"
          - "1.25"
    name: Test with Go ${{ matrix.go_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Vet and test
        run: |
          go version
          go vet ./...
          go test -race -count=1 ./...
