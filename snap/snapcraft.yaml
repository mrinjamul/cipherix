name: cipherix
base: core24
version: "3.0.0"
summary: A file encryption CLI tool
description: |
  cipherix is a file encryption tool supporting AES-256-GCM,
  XChaCha20-Poly1305, X25519 ECDH, and RSA-OAEP with a keystore.

grade: stable
confinement: strict

apps:
  cipherix:
    command: bin/cipherix
    plugs:
      - home
      - removable-media

parts:
  cipherix:
    plugin: go
    source: .
    build-snaps:
      - go/latest/stable
